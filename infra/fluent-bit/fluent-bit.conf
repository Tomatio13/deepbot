[SERVICE]
    Flush           1
    Log_Level       info
    Daemon          Off
    Parsers_File    /opt/deepbot/infra/fluent-bit/parsers.conf

[INPUT]
    Name            systemd
    Tag             journal.ssh
    Systemd_Filter  _SYSTEMD_UNIT=ssh.service
    Read_From_Tail  On
    Lowercase       On
    Strip_Underscores On

[INPUT]
    Name            systemd
    Tag             journal.sudo
    Systemd_Filter  _SYSTEMD_UNIT=sudo.service
    Read_From_Tail  On
    Lowercase       On
    Strip_Underscores On

[INPUT]
    Name            tail
    Tag             auth.tail
    Path            /var/log/auth.log,/var/log/secure
    Parser          auth_plain
    DB              /var/lib/deepbot/fluent-bit/auth.db
    Refresh_Interval 5
    Read_from_Head  False

[INPUT]
    Name            tail
    Tag             ufw.tail
    Path            /var/log/ufw.log
    Parser          ufw_plain
    DB              /var/lib/deepbot/fluent-bit/ufw.db
    Refresh_Interval 5
    Read_from_Head  False

[FILTER]
    Name            grep
    Match           journal.ssh
    Regex           message (Failed password|Failed publickey|Accepted password|Invalid user|Connection closed by invalid user|Connection closed by authenticating user|Received disconnect from|maximum authentication attempts exceeded|Permission denied|not allowed because)

[FILTER]
    Name            grep
    Match           auth.tail
    Regex           message (Failed password|Failed publickey|Accepted password|Invalid user|Connection closed by invalid user|Connection closed by authenticating user|Received disconnect from|maximum authentication attempts exceeded|Permission denied|not allowed because|authentication failure|su:)

[FILTER]
    Name            rewrite_tag
    Match           journal.ssh
    Rule            message ^.*(Failed.*password|Failed.*publickey|Invalid.*user|Connection.*closed.*invalid.*user|Connection.*closed.*authenticating.*user|Received.*disconnect.*from|maximum.*authentication.*attempts.*exceeded|Permission.*denied|not.*allowed.*because).*$ failure.$TAG false
    Rule            message ^.*Accepted.*password.*$ success.$TAG false

[FILTER]
    Name            rewrite_tag
    Match           auth.tail
    Rule            message ^.*(Failed.*password|Failed.*publickey|Invalid.*user|Connection.*closed.*invalid.*user|Connection.*closed.*authenticating.*user|Received.*disconnect.*from|maximum.*authentication.*attempts.*exceeded|Permission.*denied|not.*allowed.*because).*$ failure.$TAG false
    Rule            message ^.*Accepted.*password.*$ success.$TAG false
    Rule            message ^.*authentication.*failure.*$ sudofail.$TAG false
    Rule            message ^.*su:.*$ privilege.$TAG false

[FILTER]
    Name            grep
    Match           ufw.tail
    Regex           action (BLOCK|ALLOW)

[FILTER]
    Name            rewrite_tag
    Match           ufw.tail
    Rule            action ^BLOCK$ ufwblock.$TAG false
    Rule            action ^ALLOW$ ufwallow.$TAG false

[FILTER]
    Name            modify
    Match           failure.*
    Set             category auth_failure

[FILTER]
    Name            modify
    Match           sudofail.*
    Set             category sudo_auth_failure

[FILTER]
    Name            modify
    Match           success.*
    Set             category auth_success

[FILTER]
    Name            modify
    Match           privilege.*
    Set             category privilege_escalation

[FILTER]
    Name            modify
    Match           ufwblock.*
    Set             category ufw_block

[FILTER]
    Name            modify
    Match           ufwallow.*
    Set             category ufw_allow

[OUTPUT]
    Name            http
    Match           failure.*
    Host            127.0.0.1
    Port            8088
    URI             /alerts
    Format          json
    Json_date_key   date
    Header          Content-Type application/json

[OUTPUT]
    Name            http
    Match           sudofail.*
    Host            127.0.0.1
    Port            8088
    URI             /alerts
    Format          json
    Json_date_key   date
    Header          Content-Type application/json

[OUTPUT]
    Name            http
    Match           success.*
    Host            127.0.0.1
    Port            8088
    URI             /alerts
    Format          json
    Json_date_key   date
    Header          Content-Type application/json

[OUTPUT]
    Name            http
    Match           privilege.*
    Host            127.0.0.1
    Port            8088
    URI             /alerts
    Format          json
    Json_date_key   date
    Header          Content-Type application/json

[OUTPUT]
    Name            http
    Match           ufwblock.*
    Host            127.0.0.1
    Port            8088
    URI             /alerts
    Format          json
    Json_date_key   date
    Header          Content-Type application/json

[OUTPUT]
    Name            stdout
    Match           *
