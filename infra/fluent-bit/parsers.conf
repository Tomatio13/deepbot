[PARSER]
    Name         auth_plain
    Format       regex
    Regex        ^(?<time>\S+)\s+(?<host>\S+)\s+(?<service>[^:\[]+)(?:\[(?<pid>\d+)\])?:\s+(?<message>.*)$
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

[PARSER]
    Name         ufw_plain
    Format       regex
    Regex        ^(?<time>\S+)\s+(?<host>\S+)\s+kernel:\s+\[(?<uptime>[^\]]+)\]\s+\[UFW\s+(?<action>[A-Z]+)\]\s+(?<message>.*)$
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
